### AXIS TWIST COMPENSATION
# Corrects for X-axis twist affecting probe accuracy.
# Common on MK3S/+ due to the PINDA offset from nozzle. Run this BEFORE bed mesh.

[axis_twist_compensation]
calibrate_start_x: 24
calibrate_end_x: 228
calibrate_y: 105

